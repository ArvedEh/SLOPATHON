<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Slopario Host Lobby</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" defer></script>
    <style>
        :root {
            --bg: #07111f;
            --bg-accent: #0e1d35;
            --panel: rgba(8, 15, 28, 0.78);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text: #f4f7fb;
            --muted: #9eb0c7;
            --accent: #7ce7ff;
            --accent-2: #8cffc8;
            --danger: #ff7d7d;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            font-family: "Segoe UI", "Avenir Next", "Trebuchet MS", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(124, 231, 255, 0.18), transparent 34%),
                radial-gradient(circle at bottom right, rgba(140, 255, 200, 0.14), transparent 28%),
                linear-gradient(145deg, var(--bg), var(--bg-accent));
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 95%);
            pointer-events: none;
        }

        .shell {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100%;
            padding: clamp(20px, 3vw, 36px);
            gap: 18px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.24em;
            font-size: 0.74rem;
            color: var(--accent);
            margin: 0;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 4rem);
            line-height: 0.95;
            font-weight: 800;
        }

        .status-pill {
            align-self: flex-start;
            border: 1px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
            border-radius: 999px;
            padding: 12px 16px;
            font-size: 0.95rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .main {
            display: grid;
            grid-template-columns: minmax(260px, 420px) minmax(0, 1fr);
            gap: clamp(18px, 3vw, 34px);
            align-items: stretch;
            min-height: 0;
        }

        .card {
            border: 1px solid var(--panel-border);
            background: var(--panel);
            backdrop-filter: blur(18px);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        .info-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: clamp(20px, 3vw, 32px);
            gap: 24px;
        }

        .info-grid {
            display: grid;
            gap: 18px;
        }

        .metric {
            display: grid;
            gap: 6px;
        }

        .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--muted);
        }

        .metric-value {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            font-weight: 700;
            word-break: break-word;
        }

        .qr-card {
            display: grid;
            place-items: center;
            padding: clamp(18px, 3vw, 32px);
            min-height: 0;
        }

        .qr-frame {
            width: min(78vh, 100%);
            height: min(78vh, 100%);
            max-width: 100%;
            max-height: 100%;
            display: grid;
            place-items: center;
            padding: clamp(14px, 2vw, 22px);
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            box-shadow: inset 0 0 0 1px rgba(10, 20, 36, 0.08);
        }

        #qrcode {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
        }

        #qrcode canvas,
        #qrcode img {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            color: var(--muted);
            font-size: 0.96rem;
        }

        .footer strong {
            color: var(--text);
        }

        .error {
            color: var(--danger);
        }

        @media (max-width: 920px) {
            body {
                overflow: auto;
            }

            .shell {
                height: auto;
                min-height: 100%;
            }

            .main {
                grid-template-columns: 1fr;
            }

            .qr-frame {
                width: min(84vw, 70vh);
                height: min(84vw, 70vh);
            }

            .footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div class="brand">
                <p class="eyebrow">Slopario Host Lobby</p>
                <h1>Ready to play</h1>
            </div>
            <div class="status-pill" id="status">Preparing session…</div>
        </header>

        <section class="main">
            <article class="card info-card">
                <div class="info-grid">
                    <div class="metric">
                        <div class="metric-label">Session</div>
                        <div class="metric-value" id="sessionId">Waiting for server…</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Screen size</div>
                        <div class="metric-value" id="screenSize">Detecting…</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Join link</div>
                        <div class="metric-value" id="joinLink">Creating QR code…</div>
                    </div>
                </div>

                <div class="metric">
                    <div class="metric-label">What players do</div>
                    <div class="metric-value">Scan the code to open the client on a phone.</div>
                </div>
            </article>

            <article class="card qr-card" aria-live="polite">
                <div class="qr-frame">
                    <div id="qrcode" aria-label="Session QR code"></div>
                </div>
            </article>
        </section>

        <footer class="footer">
            <div><strong>Lobby stage</strong> stays here until the first client joins and the game starts.</div>
            <div id="footerNote">Backend: http://localhost:6969</div>
        </footer>
    </main>

    <script>
        const statusEl = document.getElementById('status');
        const sessionIdEl = document.getElementById('sessionId');
        const screenSizeEl = document.getElementById('screenSize');
        const joinLinkEl = document.getElementById('joinLink');
        const footerNoteEl = document.getElementById('footerNote');
        const qrContainer = document.getElementById('qrcode');

        let currentSession = null;
        let lastQrSize = 0;

        function getBackendBaseUrl() {
            if (window.location.origin && window.location.origin !== 'null') {
                try {
                    return new URL(window.location.origin).port === '6969'
                        ? window.location.origin
                        : `${window.location.protocol}//${window.location.hostname || 'localhost'}:6969`;
                } catch {
                    // Fall through to localhost.
                }
            }

            return 'http://localhost:6969';
        }

        function getScreenSize() {
            const width = Math.max(320, Math.round(window.screen?.width || window.innerWidth || 1000));
            const height = Math.max(240, Math.round(window.screen?.height || window.innerHeight || 800));
            return { width, height };
        }

        function getClientUrl(sessionId) {
            return `${window.location.protocol}//${window.location.host}/client/?s=${encodeURIComponent(sessionId)}`;
        }

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.classList.toggle('error', isError);
        }

        function renderQr(url) {
            if (!window.QRCode) {
                throw new Error('QR code library failed to load.');
            }

            const qrFrame = document.querySelector('.qr-frame');
            const available = Math.floor(Math.min(qrFrame.clientWidth, qrFrame.clientHeight) - 44);
            const size = Math.max(220, available);

            if (size === lastQrSize && qrContainer.dataset.renderedUrl === url) {
                return;
            }

            qrContainer.innerHTML = '';
            qrContainer.dataset.renderedUrl = url;
            lastQrSize = size;

            new QRCode(qrContainer, {
                text: url,
                width: size,
                height: size,
                colorDark: '#07111f',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M,
            });
        }

        async function createSession() {
            const backendBase = getBackendBaseUrl();
            const { width, height } = getScreenSize();

            screenSizeEl.textContent = `${width} × ${height}`;
            footerNoteEl.textContent = `Backend: ${backendBase}`;
            setStatus('Creating session…');

            const response = await fetch(`${backendBase}/api/session?width=${encodeURIComponent(width)}&height=${encodeURIComponent(height)}`);

            if (!response.ok) {
                throw new Error(`Session request failed with ${response.status}`);
            }

            const payload = await response.json();

            if (!payload?.session_id) {
                throw new Error('Server response did not include a session_id.');
            }

            currentSession = payload.session_id;
            const joinUrl = getClientUrl(currentSession);

            sessionIdEl.textContent = currentSession;
            joinLinkEl.textContent = joinUrl;
            setStatus('Session ready');
            renderQr(joinUrl);

            return joinUrl;
        }

        function rerenderQr() {
            if (!currentSession) {
                return;
            }

            renderQr(getClientUrl(currentSession));
        }

        window.addEventListener('resize', () => {
            requestAnimationFrame(rerenderQr);
        });

        window.addEventListener('load', async () => {
            try {
                await createSession();
            } catch (error) {
                console.error(error);
                sessionIdEl.textContent = 'Session unavailable';
                joinLinkEl.textContent = 'Check the backend connection';
                setStatus(error instanceof Error ? error.message : 'Failed to create session', true);
            }
        });
    </script>
</body>
</html>
